<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart — Cartly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<main class="container">
  <div class="page-header">
    <h1>Your Cart</h1>
  </div>

  <div id="loadingSpinner" class="spinner"></div>

  <div id="cartLayout" class="cart-layout hidden">
    <div>
      <div id="cartItemsList"></div>
      <button class="btn btn-ghost" id="clearCartBtn" style="margin-top:16px;">Empty cart</button>
    </div>

    <div class="summary-card">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Items</span><span id="summaryItemCount">0</span></div>
      <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row total"><span>Total</span><span id="summaryTotal">$0.00</span></div>
      <a href="checkout.html" class="btn btn-accent btn-block" style="margin-top:16px;">Proceed to Checkout</a>
    </div>
  </div>

  <div id="emptyCart" class="empty-state hidden">
    <div class="icon">🛒</div>
    <h2>Your cart is empty</h2>
    <p>Looks like you haven't added anything yet.</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:16px;">Start shopping</a>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p><strong>Cartly</strong> — a demo full-stack e-commerce store. Built with Node, Express, MongoDB &amp; vanilla JS.</p>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
