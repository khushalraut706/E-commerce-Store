<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Cartly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Join Cartly to start shopping.</p>

    <div class="alert alert-error" id="alertBox"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required />
        <div class="form-error">Please enter your name.</div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
        <div class="form-error">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required />
        <div class="form-error">Password must be at least 6 characters.</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required />
        <div class="form-error">Passwords do not match.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
